<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quà Tặng Hoa Rơi</title>
    <style>
        body { margin: 0; overflow: hidden; background: #fff0f3; font-family: 'Arial', sans-serif; }
        canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 10; }
        
        #main-container {
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; height: 100vh;
        }

        /* Hộp quà SVG */
        #gift-svg {
            width: 160px; height: 160px; cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 20; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.15));
        }
        #gift-svg:hover { transform: scale(1.15) rotate(5deg); }

        /* Ảnh bất ngờ - THAY URL CỦA BẠN TẠI ĐÂY */
        #surprise-img {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            max-width: 85vw; max-height: 80vh;
            border: 10px solid white; border-radius: 20px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4); z-index: 100;
        }

        .zoom-animation {
            display: block !important;
            animation: expand 1.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes expand {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        h2 { color: #ff4d6d; margin-top: 25px; text-align: center; }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div id="main-container">
        <!-- Hộp quà -->
        <svg id="gift-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org">
            <rect x="3" y="10" width="18" height="11" rx="2" fill="#ff4d6d""")/>>
            <path d="M2 7C2 5.89543 2.89543 5 4 5H20C21.1046 5 22 5.89543 22 7V10H2V7Z" fill="#ff758f""")/>>
            <rect x="10" y="5" width="4" height="16" fill="#ffd700""")/>>
            <path d="M12 5C12 5 12 2 9 2C6 2 6 5 9 5H12ZM12 5C12 5 12 2 15 2C18 2 18 5 15 5H12Z" fill="#ffd700""")/>>
        </svg>
        <h2 id="msg">Chạm vào hộp quà để mở nhé!</h2>

        <!-- THAY LINK ẢNH TẠI ĐÂY -->
        <img id="surprise-img" src="https://blogchiasekienthuc.com/wp-content/uploads/2022/11/hinh-anh-meme-cho-cute-10.jpg" alt="Special Gift">
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const gift = document.getElementById('gift-svg');
        const img = document.getElementById('surprise-img');
        const msg = document.getElementById('msg');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let flowers = [];
        let confettiParticles = [];
        // Danh sách các loại hoa icon
        const flowerIcons = ['🌹', '🌸', '🌼', '🌻', '🌺', '🌷'];

        class Flower {
            constructor() {
                this.reset();
                this.y = Math.random() * canvas.height;
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = -50;
                this.icon = flowerIcons[Math.floor(Math.random() * flowerIcons.length)];
                this.size = Math.random() * 20 + 15;
                this.speed = Math.random() * 2 + 1;
                this.angle = Math.random() * 360;
                this.spin = Math.random() * 2 - 1;
                this.wind = Math.random() * 1 - 0.5;
            }
            update() {
                this.y += this.speed;
                this.x += Math.sin(this.y / 50) + this.wind;
                this.angle += this.spin;
                if (this.y > canvas.height + 50) this.reset();
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle * Math.PI / 180);
                ctx.font = `${this.size}px Arial`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(this.icon, 0, 0);
                ctx.restore();
            }
        }

        class Confetti {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.size = Math.random() * 10 + 5;
                this.speedX = Math.random() * 14 - 7;
                this.speedY = Math.random() * -25 - 5;
                this.gravity = 0.5;
                this.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
            }
            update() {
                this.speedY += this.gravity;
                this.x += this.speedX;
                this.y += this.speedY;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size);
            }
        }

        // Tạo 40 bông hoa rơi
        for(let i=0; i<40; i++) flowers.push(new Flower());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            flowers.forEach(f => { f.update(); f.draw(); });
            confettiParticles.forEach((p, i) => { 
                p.update(); p.draw(); 
                if(p.y > canvas.height + 20) confettiParticles.splice(i, 1);
            });
            requestAnimationFrame(animate);
        }
        animate();

        gift.onclick = () => {
            const rect = gift.getBoundingClientRect();
            // Nổ pháo
            for(let i=0; i<150; i++) {
                confettiParticles.push(new Confetti(rect.left + 80, rect.top + 80));
            }
            // Ẩn hộp quà & Hiện ảnh
            gift.style.display = 'none';
            msg.style.display = 'none';
            img.classList.add('zoom-animation');
        };

        window.onresize = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        };
    </script>
</body>
</html>
